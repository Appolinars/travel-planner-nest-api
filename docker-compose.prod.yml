# Production stack for the Travel Planner.
# Runs on the EC2 instance in ~/app alongside a `.env` file (see .env.production.example).
#
# Usage on the server:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# GHCR_OWNER, image tags and all secrets come from the sibling .env file.
#
# CloudWatch Logs: the app services ship stdout to CloudWatch via the `awslogs`
# Docker logging driver. This REQUIRES the EC2 instance to have an IAM role
# granting logs:CreateLogGroup / CreateLogStream / PutLogEvents. Attach that
# role BEFORE deploying this file, or the containers will fail to start.
# Thanks to Docker's dual-logging cache, `docker compose logs` still works.

# Shared awslogs options. Per-service blocks merge these and add awslogs-group.
x-awslogs-options: &awslogs-options
  awslogs-region: eu-north-1
  awslogs-create-group: 'true'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_DB_USERNAME}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD}
      POSTGRES_DB: ${PG_DB_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_DB_USERNAME} -d ${PG_DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      # Management UI — restrict to your IP via the EC2 security group, or remove.
      - '15672:15672'
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - app-net

  main-api:
    image: ghcr.io/${GHCR_OWNER}/travel-planner-pet:latest
    restart: unless-stopped
    env_file: .env
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        awslogs-group: /travel-planner/main-api
        awslogs-stream: main-api
    ports:
      # Direct HTTP access kept during the HTTPS transition. Once Caddy/HTTPS
      # is verified, remove this and the SG rule so the API is HTTPS-only.
      - '5000:5000'
    volumes:
      # Persist generated PDFs across restarts/redeploys.
      - pdfs:/usr/src/app/pdfs
    healthcheck:
      # Liveness only — see HealthController. Uses busybox wget (no curl in the
      # node:20-alpine image). start_period covers boot-time DB migrations.
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:5000/api/health/live || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-net

  mailing-service:
    image: ghcr.io/${GHCR_OWNER}/travel-planner-mailing-microservice:latest
    restart: unless-stopped
    env_file: .env
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        awslogs-group: /travel-planner/mailing-service
        awslogs-stream: mailing-service
    healthcheck:
      # No HTTP server in this consumer — verify the node process is alive.
      # (Catches a defunct/zombie process; a crashed PID 1 is handled by restart.)
      test: ['CMD-SHELL', 'pgrep -f "node dist/main" > /dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # The official nginx image runs envsubst on files in /etc/nginx/templates at
    # startup. NGINX_ENVSUBST_FILTER restricts substitution to API_DOMAIN only,
    # so nginx's own runtime vars ($host, $remote_addr, ...) are left intact.
    environment:
      API_DOMAIN: ${API_DOMAIN}
      NGINX_ENVSUBST_FILTER: API_DOMAIN
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    # NOTE: the nginx image only runs its envsubst templating when the command
    # starts with "nginx". Since we override the command (to reload every 6h for
    # cert renewals), we must invoke the templating script ourselves first,
    # otherwise our default.conf.template is never rendered.
    command: '/bin/sh -c ''/docker-entrypoint.d/20-envsubst-on-templates.sh; (while :; do sleep 6h & wait $${!}; nginx -s reload; done &); exec nginx -g "daemon off;"'''
    depends_on:
      - main-api
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        awslogs-group: /travel-planner/nginx
        awslogs-stream: nginx
    networks:
      - app-net

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Attempt renewal twice a day; certbot only acts when a cert is near expiry.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  pdfs:
  certbot_certs:
  certbot_www:

networks:
  app-net:
    name: app-net
