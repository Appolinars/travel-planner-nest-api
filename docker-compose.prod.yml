# Production stack for the Travel Planner.
# Runs on the EC2 instance in ~/app alongside a `.env` file (see .env.production.example).
#
# Usage on the server:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# GHCR_OWNER, image tags and all secrets come from the sibling .env file.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_DB_USERNAME}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD}
      POSTGRES_DB: ${PG_DB_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_DB_USERNAME} -d ${PG_DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      # Management UI — restrict to your IP via the EC2 security group, or remove.
      - '15672:15672'
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - app-net

  main-api:
    image: ghcr.io/${GHCR_OWNER}/travel-planner-pet:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - '5000:5000'
    volumes:
      # Persist generated PDFs across restarts/redeploys.
      - pdfs:/usr/src/app/pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-net

  mailing-service:
    image: ghcr.io/${GHCR_OWNER}/travel-planner-mailing-microservice:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-net

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  pdfs:

networks:
  app-net:
    name: app-net
